name: TestFlight

# 폰에서 확인할 때만 GitHub Actions에서 수동 실행합니다.
# Actions → TestFlight → Run workflow
# 빌드 번호는 fastlane이 자동 증가합니다 (docs/release.md 참고).

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Optional build number (e.g. 40). Leave empty for auto increment."
        required: false
        default: ""
        type: string
  repository_dispatch:
    types: [deploy-testflight]

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and upload to TestFlight
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.5
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5"

      - name: Cache DerivedData
        id: deriveddata-cache
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-xcode26.5-${{ hashFiles('anyapp/**/*.swift', 'anyapp.xcodeproj/**') }}

      - name: Write App Store Connect API key
        env:
          ASC_KEY_CONTENT_BASE64: ${{ secrets.ASC_KEY_CONTENT_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          KEY_PATH_LINE="$(./scripts/write_asc_api_key.sh)"
          echo "$KEY_PATH_LINE" >> "$GITHUB_ENV"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: .

      - name: Deploy to TestFlight
        # MARKETING_VERSION은 Xcode에서 수동 관리, 빌드 번호는 fastlane next_build_number가 자동 설정
        run: bundle exec fastlane beta
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ env.ASC_KEY_PATH }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          DERIVED_DATA_CACHE_HIT: ${{ steps.deriveddata-cache.outputs.cache-hit }}
          TARGET_BUILD_NUMBER: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.build_number || inputs.build_number }}
