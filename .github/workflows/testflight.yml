name: TestFlight

# main push 시 TestFlight에 자동 배포합니다.
# 빌드 번호는 fastlane이 자동 증가합니다 (docs/release.md 참고).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and upload to TestFlight
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.5
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5"

      - name: Install Apple WWDR certificate
        run: |
          curl -fsSL -o /tmp/AppleWWDRCAG3.cer https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          security import /tmp/AppleWWDRCAG3.cer -k ~/Library/Keychains/login.keychain-db -T /usr/bin/codesign -T /usr/bin/security

      - name: Write App Store Connect API key
        env:
          ASC_KEY_CONTENT_BASE64: ${{ secrets.ASC_KEY_CONTENT_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          KEY_PATH_LINE="$(./scripts/write_asc_api_key.sh)"
          echo "$KEY_PATH_LINE" >> "$GITHUB_ENV"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: .

      - name: Verify CI configuration
        run: ./scripts/verify_ci_config.sh

      - name: Deploy to TestFlight
        # MARKETING_VERSION은 Xcode에서 수동 관리, 빌드 번호는 fastlane next_build_number가 자동 설정
        run: bundle exec fastlane beta
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ env.ASC_KEY_PATH }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}