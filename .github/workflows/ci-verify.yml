name: CI Verify

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "fastlane/**"
      - "scripts/verify_ci_config.sh"
      - "scripts/write_asc_api_key.sh"
      - "Gemfile"
      - "Gemfile.lock"

jobs:
  verify:
    name: Verify CI configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run verification script
        run: ./scripts/verify_ci_config.sh
